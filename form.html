<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="form.css" />
</head>
<body>

  <div class="form-wrap">

    <p class="page-title">User Profile</p>

    <form autocomplete="off">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="" required />
      </div>

      <div class="field">
        <label for="role">Role</label>
        <input type="text" id="role" placeholder="" required />
      </div>

      <div class="field">
        <label for="bio">Bio</label>
        <textarea id="bio" placeholder="" required></textarea>
      </div>

      <div class="field">
        <label for="photo">Photo URL</label>
        <input type="url" id="photo" placeholder="" required />
      </div>

      <button type="submit" class="btn-submit">Add User</button>
    </form>

  </div>

  <div class="section-divider" id="users-label" style="display:none">Users</div>
  <div class="users"></div>

  <script src="form.js"></script>
  <script>
    const obs = new MutationObserver(() => {
      document.getElementById('users-label').style.display =
        document.querySelector('.users').children.length ? 'flex' : 'none';
    });
    obs.observe(document.querySelector('.users'), { childList: true });
  </script>

</body>
</html>
